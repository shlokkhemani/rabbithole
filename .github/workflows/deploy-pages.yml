name: Deploy Cloudflare Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: cloudflare-pages-production
  cancel-in-progress: true

permissions:
  contents: read
  deployments: write

jobs:
  verify-and-deploy:
    name: Verify and deploy production
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment:
      name: production
      url: https://rabbithole.ing/

    steps:
      - name: Check out the exact commit
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install browser test runtimes
        run: npx playwright install --with-deps chromium firefox webkit

      - name: Verify types, boundaries, and committed bundles
        run: |
          npm run check:types
          npm run check:purity
          npm run check:dist

      - name: Run the full test suite
        run: npm test

      - name: Build the production site
        run: npm run build:publish

      - name: Deploy the verified commit to Cloudflare Pages
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy publish --project-name=rabbithole --branch=main --commit-hash=${{ github.sha }}
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          packageManager: npm
          wranglerVersion: "4"
